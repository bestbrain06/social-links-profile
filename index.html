<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Links Profile</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <div class="card">
        <div class="card__image">
          <img
            src="assets/images/avatar-jessica.jpeg"
            alt="An Image of a woman with black Afro Hair"
          />
        </div>
        <div class="card__body">
          <h1 class="card__title">Jessica Randall</h1>
          <span class="card__address">London, United Kingdom</span>
          <p class="card__description">
            "Front-end developer and avid reader."
          </p>
        </div>
        <div class="card__links">
          <button class="card__item">
            <a href="#" class="card__link">GitHub </a>
          </button>
          <button class="card__item">
            <a href="#" class="card__link"> Frontend Mentor</a>
          </button>
          <button class="card__item">
            <a href="#" class="card__link">LinkedIn</a>
          </button>
          <button class="card__item">
            <a href="#" class="card__link">Twitter</a>
          </button>
          <button class="card__item">
            <a href="#" class="card__link">Instagram</a>
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
